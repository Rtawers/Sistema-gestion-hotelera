services:
  db:
    image: postgres:16-alpine
    container_name: hoteleria_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-hoteleria_db}
      POSTGRES_USER: ${DB_USER:-hoteleria_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-hoteleria_pass_2026}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-hoteleria_user}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: